name: Node CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Check Node Version
        run: node -v

      - name: Check NPM Version
        run: npm -v

      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        run: npm test